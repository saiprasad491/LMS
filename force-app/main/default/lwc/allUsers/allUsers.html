<template>
  <div class="all-users-container">
    <div class="page-header">
      <div>
        <h2 class="page-title">All Users</h2>
        <p class="subheading">Showing {totalRecords} users</p>
      </div>
      <button class="add-user-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
        </svg>
        Add User
      </button>
    </div>

    <div class="controls-row">
      <div class="alphabet-filter">
        <template for:each={alphabetButtons} for:item="item">
          <button
            key={item.letter}
            class={item.buttonClass}
            data-letter={item.letter}
            onclick={handleAlphaClick}
          >
            {item.letter}
          </button>
        </template>
      </div>
      <div class="page-size-field">
        <label class="page-size-label" for="pageSizeSelect">Records per page</label>
        <lightning-combobox
          name="pageSizeSelect"
          class="page-size-select"
          options={pageSizeOptions}
          value={pageSize}
          onchange={handlePageSizeChange}
        ></lightning-combobox>
      </div>
    </div>

    <template if:true={hasUsers}>
      <div class="table-wrapper">
        <table class="users-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th class="actions-column">Actions</th>
            </tr>
          </thead>
          <tbody>
            <template for:each={paginatedUsers} for:item="user">
              <tr key={user.Id}>
                <td>{user.Name}</td>
                <td>{user.Email__c}</td>
                <td>{user.Role__c}</td>
                <td class="actions-column">
                  <button class="action-btn" title="Edit">Edit</button>
                  <button class="action-btn delete" title="Delete">Delete</button>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>

      <div class="pagination-row">
        <button class="pagination-btn" onclick={handlePrevPage} disabled={isFirstPage}>Previous</button>

        <template for:each={pageButtons} for:item="button">
          <button
            key={button.page}
            class={button.buttonClass}
            data-page={button.page}
            onclick={handlePageClick}
          >
            {button.page}
          </button>
        </template>

        <button class="pagination-btn" onclick={handleNextPage} disabled={isLastPage}>Next</button>
      </div>
    </template>

    <template if:false={hasUsers}>
      <div class="empty-state">
        <svg width="80" height="80" viewBox="0 0 24 24" fill="currentColor" opacity="0.3">
          <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
        </svg>
        <p class="empty-message">No users found</p>
      </div>
    </template>
  </div>
</template>
