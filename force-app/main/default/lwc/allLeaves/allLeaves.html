<template>
    <lightning-card title="My Leave Requests" icon-name="standard:timesheet">
        <div slot="actions">
            <lightning-button 
                label="Refresh" 
                icon-name="utility:refresh" 
                onclick={handleRefresh}
                variant="neutral">
            </lightning-button>
        </div>

        <div class="slds-p-around_medium">
            <template if:true={isLoading}>
                <div class="slds-text-align_center slds-p-around_large">
                    <lightning-spinner 
                        alternative-text="Loading" 
                        size="medium">
                    </lightning-spinner>
                </div>
            </template>

            <template if:false={isLoading}>
                <template if:true={hasLeaves}>
                    <!-- Pagination Controls Top -->
                    <div class="pagination-container slds-m-bottom_small">
                        <div class="records-per-page">
                            <label class="slds-m-right_x-small">Records per page:</label>
                            <lightning-combobox
                                name="recordsPerPage"
                                value={recordsPerPage}
                                placeholder="Select..."
                                options={pageOptions}
                                onchange={handleRecordsPerPageChange}
                                variant="label-hidden"
                                dropdown-alignment="auto">
                            </lightning-combobox>
                        </div>
                        
                        <div class="pagination-info">
                            Showing {startRecord} to {endRecord} of {totalRecords}
                        </div>
                    </div>

                    <!-- Table -->
                    <div class="table-container">
                        <table class="slds-table slds-table_bordered slds-table_cell-buffer">
                            <thead>
                                <tr class="slds-line-height_reset">
                                    <th scope="col" class="slds-text-align_left">
                                        <div class="slds-truncate" title="Leave Type">Leave Type</div>
                                    </th>
                                    <th scope="col" class="slds-text-align_left">
                                        <div class="slds-truncate" title="Start Date">Start Date</div>
                                    </th>
                                    <th scope="col" class="slds-text-align_left">
                                        <div class="slds-truncate" title="End Date">End Date</div>
                                    </th>
                                    <th scope="col" class="slds-text-align_left">
                                        <div class="slds-truncate" title="Manager Comment">Manager Comment</div>
                                    </th>
                                    <th scope="col" class="slds-text-align_left">
                                        <div class="slds-truncate" title="Reason">Reason</div>
                                    </th>
                                    <th scope="col" class="slds-text-align_center">
                                        <div class="slds-truncate" title="Status">Status</div>
                                    </th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={displayedLeaves} for:item="leave">
                                    <tr key={leave.Id} class="slds-hint-parent">
                                        <td data-label="Leave Type">
                                            <div class="slds-truncate">{leave.Leave_Type__c}</div>
                                        </td>
                                        <td data-label="Start Date">
                                            <div class="slds-truncate">{leave.formattedStartDate}</div>
                                        </td>
                                        <td data-label="End Date">
                                            <div class="slds-truncate">{leave.formattedEndDate}</div>
                                        </td>
                                        <td data-label="Manager Comment" class="slds-text-align_center">
                                            <div class="slds-truncate" title={leave.Manager_Comment__c}>{leave.Manager_Comment__c}</div>
                                        </td>
                                        <td data-label="Reason">
                                            <div class="slds-truncate" title={leave.Reason__c}>{leave.Reason__c}</div>
                                        </td>
                                        <td data-label="Status" class="slds-text-align_center">
                                            <span class={leave.statusClass}>{leave.Status__c}</span>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>

                    <!-- Pagination Controls Bottom -->
                    <div class="pagination-container slds-m-top_small">
                        <div class="pagination-buttons">
                            <lightning-button
                                label="First"
                                icon-name="utility:chevronleft"
                                onclick={handleFirst}
                                disabled={isPreviousDisabled}
                                variant="neutral">
                            </lightning-button>
                            <lightning-button
                                label="Previous"
                                icon-name="utility:chevronleft"
                                onclick={handlePrevious}
                                disabled={isPreviousDisabled}
                                variant="neutral"
                                class="slds-m-left_x-small">
                            </lightning-button>
                            <span class="page-info">Page {currentPage} of {totalPages}</span>
                            <lightning-button
                                label="Next"
                                icon-name="utility:chevronright"
                                icon-position="right"
                                onclick={handleNext}
                                disabled={isNextDisabled}
                                variant="neutral"
                                class="slds-m-right_x-small">
                            </lightning-button>
                            <lightning-button
                                label="Last"
                                icon-name="utility:chevronright"
                                icon-position="right"
                                onclick={handleLast}
                                disabled={isNextDisabled}
                                variant="neutral">
                            </lightning-button>
                        </div>
                    </div>
                </template>

                <template if:false={hasLeaves}>
                    <div class="slds-text-align_center slds-p-around_large">
                        <lightning-icon 
                            icon-name="custom:custom19" 
                            size="large" 
                            alternative-text="No leaves">
                        </lightning-icon>
                        <p class="slds-m-top_medium slds-text-heading_small">No leave requests found</p>
                        <p class="slds-m-top_small slds-text-color_weak">Submit a leave request to see it here.</p>
                    </div>
                </template>

                <template if:true={error}>
                    <div class="slds-text-align_center slds-p-around_large">
                        <lightning-icon 
                            icon-name="utility:error" 
                            size="large" 
                            alternative-text="Error">
                        </lightning-icon>
                        <p class="slds-m-top_medium slds-text-color_error">Error loading leave requests</p>
                    </div>
                </template>
            </template>
        </div>
    </lightning-card>
</template>
