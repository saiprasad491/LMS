<template>
    <div class="all-leaves-container">
        <div class="page-header">
            <h2 class="page-title">My Leave Requests</h2>
            <p class="page-subtitle">View all your leave requests and their current status</p>
        </div>
        
        <template if:true={hasLeaves}>
            <div class="table-container">
                <table class="leaves-table">
                    <thead>
                        <tr>
                            <th>Request ID</th>
                            <th>Leave Type</th>
                            <th>Start Date</th>
                            <th>End Date</th>
                            <th>Days</th>
                            <th>Status</th>
                            <th>Reason</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template for:each={leaves} for:item="leave">
                            <tr key={leave.Id} class={leave.rowClass}>
                                <td>
                                    <span class="request-id">{leave.Name}</span>
                                </td>
                                <td>
                                    <span class="leave-type-badge">{leave.Leave_Type__c}</span>
                                </td>
                                <td>{leave.Start_Date__c}</td>
                                <td>{leave.End_Date__c}</td>
                                <td class="text-center">
                                    <span class="days-count">{leave.Number_of_Days__c}</span>
                                </td>
                                <td>
                                    <span class={leave.statusBadgeClass}>{leave.Status__c}</span>
                                </td>
                                <td class="reason-cell">
                                    <span class="reason-text">{leave.Reason__c}</span>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </template>
        
        <template if:false={hasLeaves}>
            <template if:false={error}>
                <div class="empty-state">
                    <svg width="80" height="80" viewBox="0 0 24 24" fill="currentColor" opacity="0.3">
                        <path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/>
                    </svg>
                    <p class="empty-message">No leave requests found</p>
                    <p class="empty-submessage">Start by applying for a leave request</p>
                </div>
            </template>
        </template>
        
        <template if:true={error}>
            <div class="error-state">
                <svg width="60" height="60" viewBox="0 0 24 24" fill="currentColor" opacity="0.3">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                </svg>
                <p class="error-message">Error loading leave requests</p>
                <p class="error-details">{error.body.message}</p>
            </div>
        </template>
    </div>
</template>
