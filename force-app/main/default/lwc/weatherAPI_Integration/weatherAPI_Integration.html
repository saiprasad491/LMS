<template>
    <lightning-card icon-name="standard:account" variant="base" title="Weather MAP API " >
      <div class="slds-var-m-around_medium" >
        <lightning-input label="Search City" onchange={handleChange} ></lightning-input>
        <lightning-button label="Get Weather" onclick={buttonClick}></lightning-button>        
      </div>
      <div>
        <img style="max-width: 50%; max-height:150%; height: 100px; width: 100px;" src={imageURL} />
      </div>
      <b>Weather: <i> {conditionText} </i> </b> <br><br>
      <b>Current Temperature: <i> {temperature} </i> </b> <br><br>
    </lightning-card>
</template>
