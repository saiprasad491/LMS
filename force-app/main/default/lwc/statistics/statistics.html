<template>
    <div class="statistics-container">
        <div class="page-header">
            <h2 class="page-title">Leave Statistics by Type</h2>
            <p class="page-subtitle">View leave allocation, consumption, and availability for each leave type</p>
        </div>

        <template if:true={hasData}>
            <!-- Donut Charts Row - One chart per leave type -->
            <div class="donut-charts-row">
                <template for:each={leaveTypeStats} for:item="leaveType">
                    <div key={leaveType.id} class="donut-chart-card">
                        <div class="donut-chart">
                            <svg viewBox="0 0 200 200" class="donut-svg">
                                <!-- Background circle -->
                                <circle
                                    class="donut-background"
                                    cx="100"
                                    cy="100"
                                    r="70"
                                    fill="transparent"
                                    stroke="#e0e0e0"
                                    stroke-width="20"
                                ></circle>
                                <!-- Consumed portion -->
                                <circle
                                    class="donut-segment"
                                    cx="100"
                                    cy="100"
                                    r="70"
                                    fill="transparent"
                                    stroke={leaveType.color.stroke}
                                    stroke-width="20"
                                    stroke-dasharray={leaveType.donutData.circumference}
                                    stroke-dashoffset={leaveType.donutData.offset}
                                    transform="rotate(-90 100 100)"
                                ></circle>
                            </svg>
                            <div class="donut-center">
                                <div class="donut-value">{leaveType.totalConsumed}</div>
                                <div class="donut-sublabel">of {leaveType.totalAllocated}</div>
                                <div class="donut-label">{leaveType.consumedPercentage}% Used</div>
                            </div>
                        </div>
                        <div class="chart-title">{leaveType.leaveType}</div>
                        <div class="chart-stats">
                            <div class="stat-item">
                                <span class="stat-label">Allocated:</span>
                                <span class="stat-value allocated">{leaveType.totalAllocated}</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">Consumed:</span>
                                <span class="stat-value consumed">{leaveType.totalConsumed}</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">Remaining:</span>
                                <span class="stat-value remaining">{leaveType.totalRemaining}</span>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </template>

        <!-- Empty State -->
        <template if:false={hasData}>
            <div class="empty-state">
                <svg width="80" height="80" viewBox="0 0 24 24" fill="currentColor" opacity="0.3">
                    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/>
                </svg>
                <p class="empty-message">No statistics available</p>
                <p class="empty-submessage">Leave data will appear here once employees are assigned leaves</p>
            </div>
        </template>
    </div>
</template>
