<template>
    <div class="statistics-root">
        <!-- Header -->
        <header class="stats-header">
            <h2>Leave Statistics</h2>

            <div class="totals">
                <div class="total-card total-allocated">
                    <div class="label">Allocated</div>
                    <div class="value">{totalAllocated}</div>
                </div>

                <div class="total-card total-consumed">
                    <div class="label">Consumed</div>
                    <div class="value">{totalConsumed}</div>
                </div>

                <div class="total-card total-remaining">
                    <div class="label">Remaining</div>
                    <div class="value">{totalRemaining}</div>
                </div>
            </div>
        </header>

        <!-- Empty State -->
        <template if:false={hasData}>
            <div class="empty-state">
                <p>No leave data available.</p>
            </div>
        </template>

        <!-- Data View -->
        <template if:true={hasData}>
            <section class="cards-grid">
                <template for:each={leaveTypeStats} for:item="stat">
                    <article key={stat.id} class="type-card">

                        <!-- Top Section -->
                        <div class="card-top">

                            <div 
                                class="donut"
                                title={stat.title}
                                role="progressbar"
                                aria-valuenow={stat.donutData.percentage}
                                aria-valuemin="0"
                                aria-valuemax="100"
                            >
                                <svg viewBox="0 0 160 160" class="donut-svg">
                                    <circle 
                                        class="donut-bg"
                                        cx="80" cy="80" r="70"
                                        stroke-width="20"
                                        fill="none">
                                    </circle>

                                    <circle
                                        class="donut-arc"
                                        cx="80" cy="80" r="70"
                                        stroke-width="20"
                                        fill="none"
                                        stroke={stat.color.stroke}
                                        stroke-dasharray={stat.donutData.circumference}
                                        stroke-dashoffset={stat.donutData.offset}
                                        stroke-linecap="round"
                                        transform="rotate(-90 80 80)">
                                    </circle>
                                </svg>

                                <div class="donut-center">
                                    <div class="percent">
                                        {stat.donutData.percentage}%
                                    </div>
                                </div>
                            </div>

                            <div class="type-meta">
                                <div class="type-label">{stat.leaveType}</div>

                                <div class="type-numbers">
                                    <span class="num allocated">
                                        Allocated: {stat.totalAllocated}
                                    </span>

                                    <span class="num consumed">
                                        Consumed: {stat.totalConsumed}
                                    </span>

                                    <span class="num remaining">
                                        Remaining: {stat.totalRemaining}
                                    </span>
                                </div>
                            </div>
                        </div>

                        <!-- Footer -->
                        <div class="card-footer">
                            <div class="consumed-bar">
                                <div 
                                    class="bar-fill"
                                    style={stat.barStyle}>
                                </div>
                            </div>

                            <div class="legend">
                                <span class="legend-consumed">Consumed</span>
                                <span class="legend-remaining">Remaining</span>
                            </div>
                        </div>

                    </article>
                </template>
            </section>
        </template>
    </div>
</template>
