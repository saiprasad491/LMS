<template>
  <!-- Login/Register - Show when not authenticated -->
  <template if:false={isAuthenticated}>
    <template if:true={showRegister}>
      <c-register onbacktologin={handleBackToLogin}></c-register>
    </template>
    
    <template if:false={showRegister}>
      <c-login 
        onloginsuccess={handleLoginSuccess}
        onshowregister={handleShowRegister}>
      </c-login>
    </template>
  </template>

  <!-- Main Layout Content - Show when authenticated -->
  <template if:true={isAuthenticated}>
    <div class="main-container">
      <!-- Sidebar Navigation -->
      <aside class={sidebarClass}>
        <div class="sidebar-header">
          <div class="logo-container">
            <svg class="logo-icon" width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
              <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/>
            </svg>
            <h2 class="logo-text">LMS</h2>
          </div>
          
          <!-- Toggle button -->
          <button class="toggle-btn" onclick={toggleSidebar} aria-label="Toggle sidebar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
            </svg>
          </button>
        </div>
        
        <nav class="sidebar-nav">
          <ul class="nav-menu">
            <li class="nav-item active">
              <a href="#" class="nav-link" data-view="dashboard" onclick={handleNavigation}>
                <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                </svg>
                <span class="nav-label">Dashboard</span>
              </a>
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link" data-view="leaveRequest" onclick={handleNavigation}>
                <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M3 3h8v8H3V3zm10 0h8v8h-8V3zM3 13h8v8H3v-8zm10 8v-8h8v8h-8z"/>
                </svg>
                <span class="nav-label">Leave Request</span>
              </a>
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link" data-view="allUsers" onclick={handleNavigation}>
                <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
                </svg>
                <span class="nav-label">All Users</span>
              </a>
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link" data-view="allLeaves" onclick={handleNavigation}>
                <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M9 11H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2zm2-7h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11z"/>
                </svg>
                <span class="nav-label">All Leaves</span>
              </a>
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link" data-view="statistics" onclick={handleNavigation}>
                <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/>
                </svg>
                <span class="nav-label">Statistics</span>
              </a>
            </li>
          </ul>
        </nav>
      </aside>

      <!-- Main Content Area -->
      <div class="content-wrapper">
        <!-- Header -->
        <header class="header">
          <div class="header-content">
            <h1 class="header-title">Leave Management System</h1>
            <div class="header-actions">
              <!-- <div class="notification-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2zm-2 1H8v-6c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5v6z"/>
                </svg>
              </div> -->
              <div class="user-profile">
                <div class="user-avatar">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                  </svg>
                </div>
                <span class="user-name">{currentUser}</span>
                <button class="logout-btn" onclick={handleLogout} title="Logout">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </header>

        <!-- Page Content -->
        <main class="page-content">
          <!-- Dashboard View -->
          <template if:true={showDashboard}>
            <div class="dashboard-content">
              <h2>Welcome to Dashboard</h2>
              <p>This is the dashboard view. Dashboard content will be displayed here.</p>
            </div>
          </template>

          <!-- Leave Request -->
           <template if:true={showLeaveRequest}>
            <c-leave-request></c-leave-request>
           </template>

          <!-- All Users View -->
          <template if:true={showAllUsers}>
            <c-all-users></c-all-users>
          </template>

          <!-- All Leaves View -->
          <template if:true={showAllLeaves}>
            <div class="leaves-content">
              <h2>All Leaves</h2>
              <p>Leaves management content will be displayed here.</p>
            </div>
          </template>

          <!-- Statistics View -->
          <template if:true={showStatistics}>
            <div class="statistics-content">
              <h2>Statistics</h2>
              <p>Statistics and reports will be displayed here.</p>
            </div>
          </template>
        </main>
      </div>
    </div>
  </template>
</template>
