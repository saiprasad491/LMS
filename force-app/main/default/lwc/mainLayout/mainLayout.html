<template>
  <!-- Login/Register - Show when not authenticated -->
  <template if:false={isAuthenticated}>
    <template if:true={showRegister}>
      <c-register onbacktologin={handleBackToLogin}></c-register>
    </template>
    
    <template if:false={showRegister}>
      <c-login 
        onloginsuccess={handleLoginSuccess}
        onshowregister={handleShowRegister}>
      </c-login>
    </template>
  </template>

  <!-- Main Layout Content - Show when authenticated -->
  <template if:true={isAuthenticated}>
    <div class="main-container">
      <!-- Sidebar Navigation -->
      <aside class={sidebarClass}>
        <div class="sidebar-header">
          <div class="logo-container">
            <svg class="logo-icon" width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
              <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/>
            </svg>
            <h2 class="logo-text">LMS</h2>
          </div>
          
          <!-- Toggle button -->
          <button class="toggle-btn" onclick={toggleSidebar} aria-label="Toggle sidebar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
            </svg>
          </button>
        </div>
        
        <nav class="sidebar-nav">
          <ul class="nav-menu">
            <li class="nav-item active">
              <a href="#" class="nav-link" data-view="dashboard" onclick={handleNavigation}>
                <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                </svg>
                <span class="nav-label">Dashboard</span>
              </a>
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link" data-view="leaveRequest" onclick={handleNavigation}>
                <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M3 3h8v8H3V3zm10 0h8v8h-8V3zM3 13h8v8H3v-8zm10 8v-8h8v8h-8z"/>
                </svg>
                <span class="nav-label">Leave Request</span>
              </a>
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link" data-view="allLeaves" onclick={handleNavigation}>
                <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M9 11H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2zm2-7h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11z"/>
                </svg>
                <span class="nav-label">All Leaves</span>
              </a>
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link" data-view="statistics" onclick={handleNavigation}>
                <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/>
                </svg>
                <span class="nav-label">Statistics</span>
              </a>
            </li>
          </ul>
        </nav>
      </aside>

      <!-- Main Content Area -->
      <div class="content-wrapper">
        <!-- Header -->
        <header class="header">
          <div class="header-content">
            <h1 class="header-title">Leave Management System</h1>
            <div class="header-actions">
              <div class="user-profile">
                <div class="user-avatar">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                  </svg>
                </div>
                <span class="user-name">{currentUser.Name}</span>
                <button class="logout-btn" onclick={handleLogout} title="Logout">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </header>

        <!-- Page Content -->
        <main class="page-content">
          <!-- Dashboard View -->
          <template if:true={showDashboard}>
            <!-- Only render dashboard children after user initialization to avoid transient/misaligned renders -->
            <template if:true={userInitialized}>
              <div class="dashboard-content">
                <h2>Welcome to Dashboard</h2>
                <template if:true={isApprover}>
                  <c-approvals onleaveupdated={handleLeaveUpdated}></c-approvals>
                </template>
                <template if:false={isApprover} >
                  <p> Only Approver Can Access </p>
                </template>
                <!-- For regular users show their personal dashboard components -->
                <!-- <template if:false={isApprover}>
                  <c-statistics user-id={currentUserId} leaves-data={allUserLeaves}></c-statistics>
                </template> -->
              </div>
            </template>
            <template if:false={userInitialized}>
              <div class="dashboard-loading">
                <p>Loading dashboard...</p>
              </div>
            </template>
          </template>

           <!-- Leave Request -->
           <template if:true={showLeaveRequest}>
            <c-leave-request user-id={currentUserId}></c-leave-request>
           </template>

          <!-- All Leaves View -->
          <template if:true={showAllLeaves}>
            <c-all-leaves user-id={currentUserId} leaves-data={allUserLeaves}></c-all-leaves>
          </template>

          <!-- Statistics View -->
          <template if:true={showStatistics}>
            <c-statistics user-id={currentUserId} leaves-data={allUserLeaves}></c-statistics>
          </template>
        </main>
      </div>
    </div>
  </template>
</template>
